const CATEGORY={attraction:{label:"景點",dot:"attraction",icon:"📷"},food:{label:"美食",dot:"food",icon:"🍜"},port:{label:"港口／碼頭",dot:"port",icon:"⚓"}};
function googleMapUrl(q){return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(q)}`}function googleRouteUrl(q){return `https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(q)}&travelmode=driving`}function escapeHtml(v){return String(v).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]))}function withNumbers(island){const c={attraction:0,food:0,port:0};return island.items.map(item=>({...item,no:item.type==="port"?"⚓":String(++c[item.type])}))}
function placeCard(item){const cate=CATEGORY[item.type];return `<li class="placeCard" data-type="${item.type}"><div class="placeTop"><span class="badge ${cate.dot}">${escapeHtml(item.no)}</span><p class="placeTitle">${escapeHtml(item.title)}</p></div><p class="placeNote">${escapeHtml(item.note)}</p><div class="actions"><a class="mapLink" href="${googleMapUrl(item.query)}" target="_blank" rel="noopener">Google 地圖</a><a class="routeLink" href="${googleRouteUrl(item.query)}" target="_blank" rel="noopener">開始導航</a></div></li>`}
function renderSections(){const root=document.querySelector("#islands");const ports=[];root.innerHTML=ISLANDS.map(island=>{const items=withNumbers(island);const grouped=["attraction","food","port"].map(type=>{const groupItems=items.filter(item=>item.type===type);if(!groupItems.length)return "";return `<section class="group" data-group="${type}"><h3><span>${CATEGORY[type].icon} ${island.name}${CATEGORY[type].label}</span><small>${groupItems.length} 個</small></h3><ul class="placeList">${groupItems.map(item=>placeCard(item)).join("")}</ul></section>`}).join("");ports.push(...items.filter(item=>item.type==="port").map(item=>({...item,island:island.name})));return `<section class="section" id="${island.id}" data-theme="${island.theme}"><div class="sectionHeader"><h2>${island.name}<small>${island.en}</small></h2><a class="openIsland" href="${googleMapUrl(island.name+' 馬祖')}" target="_blank" rel="noopener">開 ${island.name} 地圖</a></div><div class="sectionBody"><div class="mapShell"><div class="mapToolbar"><div class="mapHint">拖曳地圖、點標記開 Google Maps</div><div class="filters" role="group" aria-label="${island.name}地圖篩選"><button class="active" data-island="${island.id}" data-filter="all">全部</button><button data-island="${island.id}" data-filter="attraction">景點</button><button data-island="${island.id}" data-filter="food">美食</button><button data-island="${island.id}" data-filter="port">港口</button></div></div><div class="map" id="map-${island.id}" aria-label="${island.name}地圖"></div></div><div class="legend"><span><i class="dot attraction"></i>景點</span><span><i class="dot food"></i>美食</span><span><i class="dot port"></i>港口</span></div><div class="groupGrid">${grouped}</div></div></section>`}).join("");document.querySelector("#portGrid").innerHTML=ports.map(port=>`<a href="${googleMapUrl(port.query)}" target="_blank" rel="noopener">${escapeHtml(port.title)}<small>${escapeHtml(port.island)}｜開 Google Maps</small></a>`).join("")}
const mapState=new Map();function renderMapFallback(island){const el=document.querySelector(`#map-${island.id}`);el.classList.add("mapFallback");el.innerHTML=`<div><strong>${escapeHtml(island.name)}地圖暫時無法載入</strong><p>仍可用下方清單直接開 Google Maps。</p><a href="${googleMapUrl(island.name+' 馬祖')}" target="_blank" rel="noopener">開 ${escapeHtml(island.name)} Google Maps</a></div>`}
function initMaps(){if(!window.L){ISLANDS.forEach(renderMapFallback);return}ISLANDS.forEach(island=>{const items=withNumbers(island);const map=L.map(`map-${island.id}`,{scrollWheelZoom:false,zoomControl:true,tap:true}).setView(island.center,13);L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png",{maxZoom:19,attribution:"&copy; OpenStreetMap"}).addTo(map);const markers=items.map(item=>{const cls=item.type==="attraction"?"marker-attraction":item.type==="food"?"marker-food":"marker-port";const icon=L.divIcon({className:`map-marker ${cls}`,html:`<span>${escapeHtml(item.no)}</span>`,iconSize:[34,34],iconAnchor:[17,17],popupAnchor:[0,-18]});const marker=L.marker([item.lat,item.lng],{icon});marker.bindPopup(`<strong>${escapeHtml(item.title)}</strong><p>${escapeHtml(item.note)}</p><div class="popupActions"><a href="${googleMapUrl(item.query)}" target="_blank" rel="noopener">地圖</a><a class="route" href="${googleRouteUrl(item.query)}" target="_blank" rel="noopener">導航</a></div>`);marker.addTo(map);return{marker,item}});map.fitBounds(L.latLngBounds(items.map(item=>[item.lat,item.lng])),{padding:[34,34],maxZoom:14});mapState.set(island.id,{map,markers})})}
function applyFilter(islandId,filter){const state=mapState.get(islandId);const section=document.querySelector(`#${islandId}`);section.querySelectorAll(".filters button").forEach(btn=>btn.classList.toggle("active",btn.dataset.filter===filter));section.querySelectorAll(".placeCard").forEach(card=>{card.style.display=filter==="all"||card.dataset.type===filter?"":"none"});section.querySelectorAll(".group").forEach(group=>{group.style.display=filter==="all"||group.dataset.group===filter?"":"none"});if(!state)return;const visible=[];state.markers.forEach(({marker,item})=>{if(filter==="all"||item.type===filter){marker.addTo(state.map);visible.push([item.lat,item.lng])}else marker.removeFrom(state.map)});if(visible.length)state.map.fitBounds(L.latLngBounds(visible),{padding:[34,34],maxZoom:15})}
document.addEventListener("click",event=>{const btn=event.target.closest(".filters button");if(btn)applyFilter(btn.dataset.island,btn.dataset.filter)});renderSections();initMaps();window.addEventListener("load",()=>setTimeout(()=>mapState.forEach(({map})=>map.invalidateSize()),120));
</script>
</body>
</html>
